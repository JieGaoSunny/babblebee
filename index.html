<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BabbleBee 古文磨耳朵</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="app" id="app">

  <!-- ===== HOME PAGE ===== -->
  <main id="page-home" class="page active">
    <div class="topbar">
      <div class="topbar-left">
        <img src="logo.png" alt="BabbleBee" class="topbar-logo">
        <span class="topbar-title">BabbleBee</span>
        <span class="topbar-sub">古文磨耳朵</span>
      </div>
    </div>
    <div class="main-content">
      <aside class="sidebar" id="sidebar">
        <div class="continue-card" id="continue-card"></div>
      </aside>
      <div class="bookshelf-area" id="bookshelf-area"></div>
    </div>
  </main>

  <!-- ===== BOOK DETAIL PAGE ===== -->
  <main id="page-book" class="page">
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-actions" id="detail-actions"></div>
    <div class="detail-tracks" id="detail-tracks"></div>
    <div id="book-pdf"></div>
  </main>

  <!-- ===== MINI PLAYER BAR ===== -->
  <div id="player-bar" class="player-bar hidden">
    <div class="mini-progress">
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
    </div>
    <div class="mini-cover" id="mini-cover" onclick="openVinyl()"></div>
    <div class="mini-info" onclick="openVinyl()">
      <div class="mini-title" id="player-title">未播放</div>
      <div class="mini-sub">
        <span id="player-book"></span>
        <span id="player-count"></span>
      </div>
    </div>
    <div class="mini-controls">
      <button onclick="playerPrev()" class="mini-btn" title="上一首"><i class="ri-skip-back-fill"></i></button>
      <button onclick="playerToggle()" id="btn-play" class="mini-btn mini-btn-play"><i class="ri-play-fill"></i></button>
      <button onclick="playerNext()" class="mini-btn" title="下一首"><i class="ri-skip-forward-fill"></i></button>
      <button onclick="toggleLoop()" id="mini-btn-loop" class="mini-btn mini-btn-sm" title="循环模式"><i class="ri-repeat-one-line"></i></button>
    </div>
  </div>

  <!-- ===== VINYL FULL PLAYER ===== -->
  <div id="vinyl-player" class="vinyl-player hidden">
    <div class="vinyl-bg" id="vinyl-bg"></div>
    <div class="vinyl-header">
      <button class="vinyl-close" onclick="closeVinyl()"><i class="ri-arrow-down-s-line" style="font-size:24px"></i></button>
      <div class="vinyl-header-info">
        <div class="vinyl-book-title" id="vinyl-book-title"></div>
        <div class="vinyl-book-sub" id="vinyl-book-sub"></div>
      </div>
      <span style="width:40px"></span>
    </div>
    <div class="vinyl-stage">
      <div class="vinyl-arm-pivot">
        <div class="vinyl-arm" id="vinyl-arm"></div>
      </div>
      <div class="vinyl-disc" id="vinyl-disc">
        <div class="vinyl-groove"></div>
        <div class="vinyl-groove g2"></div>
        <div class="vinyl-groove g3"></div>
        <div class="vinyl-center" id="vinyl-center"></div>
      </div>
    </div>
    <div class="vinyl-info">
      <div class="vinyl-track-name" id="vinyl-track-name"></div>
      <div class="vinyl-track-count" id="vinyl-track-count"></div>
    </div>
    <div class="vinyl-progress">
      <span id="vinyl-time-cur">0:00</span>
      <input type="range" id="vinyl-progress-bar" min="0" max="100" value="0" step="0.1">
      <span id="vinyl-time-dur">0:00</span>
    </div>
    <div class="vinyl-controls">
      <button onclick="toggleLoop()" id="vinyl-btn-loop" class="vinyl-ctrl" title="循环模式"><i class="ri-repeat-one-line"></i></button>
      <button onclick="playerPrev()" class="vinyl-ctrl"><i class="ri-skip-back-fill"></i></button>
      <button onclick="playerToggle()" id="vinyl-btn-play" class="vinyl-ctrl vinyl-ctrl-play"><i class="ri-play-fill"></i></button>
      <button onclick="playerNext()" class="vinyl-ctrl"><i class="ri-skip-forward-fill"></i></button>
      <button class="vinyl-ctrl" onclick="showTrackList()" title="播放列表"><i class="ri-list-unordered"></i></button>
    </div>
  </div>

</div>
<audio id="audio" preload="auto"></audio>
<script src="app.js"></script>
</body>
</html>
