<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BabbleBee 古文磨耳朵</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Italiana&display=swap">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="app" id="app">

  <!-- ===== HOME PAGE ===== -->
  <main id="page-home" class="page active">
    <header class="header">
      <div class="header-left">
        <img src="logo.png" alt="" class="topbar-logo" onclick="goHome()" style="cursor:pointer">
        <h1>古文磨耳朵</h1>
        <span class="header-en">BabbleBee</span>
      </div>
      <div class="header-actions">
        <i class="ri-search-line"></i>
      </div>
    </header>
    <div class="main-content">
      <aside class="sidebar" id="sidebar">
        <div class="continue-card" id="continue-card"></div>
      </aside>
      <div class="bookshelf-area" id="bookshelf-area"></div>
    </div>
    <div class="spacer"></div>
  </main>

  <!-- ===== BOOK DETAIL PAGE ===== -->
  <main id="page-book" class="page">
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-actions" id="detail-actions"></div>
    <div class="detail-tracks" id="detail-tracks"></div>
    <div id="book-pdf"></div>
    <div class="spacer"></div>
  </main>

  <!-- bottom nav removed -->

  <!-- ===== MINI PLAYER BAR ===== -->
  <div id="player-bar" class="player-bar hidden">
    <div class="mini-progress">
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
    </div>
    <div class="mini-cover" id="mini-cover" onclick="openVinyl()"></div>
    <div class="mini-info" onclick="openVinyl()">
      <div class="mini-title" id="player-title">未播放</div>
      <div class="mini-sub">
        <span id="player-book"></span>
        <span id="player-count"></span>
      </div>
    </div>
    <div class="mini-controls">
      <button onclick="playerPrev()" class="mini-btn" title="上一首"><i class="ri-skip-back-fill"></i></button>
      <button onclick="playerToggle()" id="btn-play" class="mini-btn mini-btn-play"><i class="ri-play-fill"></i></button>
      <button onclick="playerNext()" class="mini-btn" title="下一首"><i class="ri-skip-forward-fill"></i></button>
      <button onclick="toggleLoop()" id="mini-btn-loop" class="mini-btn mini-btn-sm" title="循环模式"><i class="ri-repeat-one-line"></i></button>
    </div>
  </div>

  <!-- ===== BOTTOM SHEET PLAYER ===== -->
  <div id="vinyl-overlay" class="sheet-overlay hidden" onclick="closeVinyl()"></div>
  <div id="vinyl-player" class="sheet-player hidden">
    <div class="sheet-handle" onclick="closeVinyl()"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-top">
      <div class="sheet-cover" id="sheet-cover"></div>
      <div class="sheet-meta">
        <div class="sheet-track-name" id="vinyl-track-name">—</div>
        <div class="sheet-track-sub" id="vinyl-book-title">—</div>
        <div class="sheet-track-sub" id="vinyl-book-sub"></div>
        <div class="sheet-track-count" id="vinyl-track-count"></div>
      </div>
    </div>
    <div class="sheet-progress">
      <input type="range" id="vinyl-progress-bar" min="0" max="100" value="0" step="0.1">
      <div class="sheet-times"><span id="vinyl-time-cur">0:00</span><span id="vinyl-time-dur">0:00</span></div>
    </div>
    <div class="sheet-controls">
      <button onclick="playerPrev()" class="sheet-btn"><i class="ri-skip-back-fill"></i></button>
      <button onclick="seekBack()" class="sheet-btn sheet-btn-sm"><i class="ri-replay-10-line"></i></button>
      <button onclick="playerToggle()" id="vinyl-btn-play" class="sheet-btn sheet-btn-play"><i class="ri-play-fill"></i></button>
      <button onclick="seekForward()" class="sheet-btn sheet-btn-sm"><i class="ri-forward-10-line"></i></button>
      <button onclick="playerNext()" class="sheet-btn"><i class="ri-skip-forward-fill"></i></button>
    </div>
    <div class="sheet-actions">
      <button onclick="toggleLoop()" id="vinyl-btn-loop" class="sheet-action"><i class="ri-repeat-one-line"></i><span>单曲</span></button>
      <button onclick="toggleLoop()" class="sheet-action"><i class="ri-repeat-line"></i><span>整本</span></button>
      <button onclick="openPdf()" class="sheet-action"><i class="ri-text"></i><span>A-B</span></button>
      <button onclick="cycleSpeed()" id="btn-speed" class="sheet-action"><i class="ri-speed-line"></i><span>1.0x</span></button>
      <button class="sheet-action" onclick="showTrackList()"><i class="ri-moon-line"></i><span>定时</span></button>
    </div>
  </div>

</div>
<audio id="audio" preload="auto"></audio>
<script src="app.js"></script>
</body>
</html>
