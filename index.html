<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BabbleBee 古文磨耳朵</title>
<link rel="stylesheet" href="style.css?v=20260415">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Italiana&display=swap">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="app" id="app">

  <!-- ===== HOME PAGE ===== -->
  <main id="page-home" class="page active">
    <header class="header">
      <div class="header-left">
        <img src="logo.png" alt="" class="topbar-logo" onclick="goHome()" style="cursor:pointer">
        <h1>古文磨耳朵</h1>
        <span class="header-en">BabbleBee</span>
        <span class="header-slogan">日习一音，耳聪心明 — A buzz a day, wisdoms on the way.</span>
      </div>
    </header>
    <div class="main-content">
      <aside class="sidebar" id="sidebar">
        <div class="continue-card" id="continue-card"></div>
      </aside>
      <div class="bookshelf-area" id="bookshelf-area"></div>
    </div>
    <div class="spacer"></div>
  </main>

  <!-- ===== BOOK DETAIL PAGE ===== -->
  <main id="page-book" class="page">
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-actions" id="detail-actions"></div>
    <div class="detail-tracks" id="detail-tracks"></div>
    <div id="book-pdf"></div>
    <div class="spacer"></div>
  </main>

  <!-- ===== MINI FAB (collapsed) ===== -->
  <button id="player-fab" class="player-fab hidden" onclick="playerExpandBar()">
    <i class="ri-music-2-fill"></i>
  </button>

  <!-- ===== BAR PLAYER ===== -->
  <div id="player-bar" class="player-bar hidden">
    <div class="bar-progress">
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
    </div>
    <div class="bar-cover" id="bar-cover" onclick="playerExpandFull()"></div>
    <div class="bar-info" onclick="playerExpandFull()">
      <div class="bar-title" id="player-title">未播放</div>
      <div class="bar-sub"><span id="player-book"></span></div>
    </div>
    <div class="bar-controls">
      <button onclick="playerPrev()" class="bar-btn" title="上一首"><i class="ri-skip-back-fill"></i></button>
      <button onclick="playerToggle()" id="btn-play" class="bar-btn bar-btn-play"><i class="ri-play-fill"></i></button>
      <button onclick="playerNext()" class="bar-btn" title="下一首"><i class="ri-skip-forward-fill"></i></button>
      <button onclick="playerCollapse()" class="bar-btn bar-btn-collapse" title="收起"><i class="ri-arrow-down-s-line"></i></button>
      <button onclick="playerClose()" class="bar-btn bar-btn-collapse" title="关闭"><i class="ri-close-line"></i></button>
    </div>
  </div>

  <!-- ===== FULL SCREEN PLAYER ===== -->
  <div id="player-full" class="player-full hidden">
    <div class="full-top-bar">
      <button onclick="playerCollapseFull()" class="full-btn-back"><i class="ri-arrow-left-s-line"></i></button>
    </div>
    <div class="full-cover" id="full-cover"></div>
    <div class="full-title" id="full-title"></div>
    <div class="full-book" id="full-book"></div>
    <div class="full-count" id="full-count"></div>
    <div class="full-progress">
      <span class="full-time" id="full-time-cur">0:00</span>
      <input type="range" id="full-progress-bar" min="0" max="100" value="0" step="0.1">
      <span class="full-time" id="full-time-dur">0:00</span>
    </div>
    <div class="full-controls">
      <button onclick="toggleLoop()" id="full-btn-loop" class="full-btn full-btn-sm" title="循环模式"><i class="ri-repeat-one-line"></i><span class="full-btn-label" id="full-loop-label">单曲</span></button>
      <button onclick="playerSeek(-15)" class="full-btn" title="回退15秒"><i class="ri-replay-15-fill"></i></button>
      <button onclick="playerPrev()" class="full-btn" title="上一首"><i class="ri-skip-back-fill"></i></button>
      <button onclick="playerToggle()" id="btn-play-full" class="full-btn full-btn-play"><i class="ri-play-fill"></i></button>
      <button onclick="playerNext()" class="full-btn" title="下一首"><i class="ri-skip-forward-fill"></i></button>
      <button onclick="playerSeek(30)" class="full-btn" title="快进30秒"><i class="ri-forward-30-fill"></i></button>
      <button onclick="toggleSpeed()" id="full-btn-speed" class="full-btn full-btn-sm" title="倍速"><span class="speed-label">1.0x</span></button>
    </div>
  </div>

</div>
<audio id="audio" preload="auto"></audio>
<script src="app.js?v=20260415"></script>
</body>
</html>
